        button { padding: 10px 20px; margin: 10px; font-size: 16px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>

    <button onclick="checkCurrentData()">Check Current Data</button>

                grades: ['PP1', 'PP2', 'GRADE 1', 'GRADE 2', 'GRADE 3', 'GRADE 4', 'GRADE 5', 'GRADE 6', 'GRADE 7', 'GRADE 8', 'GRADE 9', 'GRADE 10', 'GRADE 11', 'GRADE 12'],

                ]
            }
        };
        
        function showMessage(msg, isError = false) {
            const message = document.getElementById('message');
            message.innerHTML = `<div class="${isError ? 'error' : 'success'}">${msg}</div>`;
            setTimeout(() => message.innerHTML = '', 5000);
        }
        
        function checkCurrentData() {
            const data = localStorage.getItem(STORAGE_KEY);
            const output = document.getElementById('output');
            
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    output.textContent = JSON.stringify(parsed, null, 2);
                    showMessage(`Data found: ${parsed.students?.length || 0} students, ${parsed.assessments?.length || 0} assessments`);
                } catch (e) {
                    output.textContent = 'Error parsing data: ' + e.message;
                    showMessage('Error parsing data', true);
                }
            } else {
                output.textContent = 'No data found in localStorage';
                showMessage('No data in localStorage', true);
            }
        }
        
        function resetToDefaults() {
            if (confirm('Reset all data to default sample data? This will replace any existing data.')) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultData));
                showMessage('Data reset to defaults successfully!');
                checkCurrentData();
            }
        }
        
        function clearAllData() {
            if (confirm('Clear ALL data from localStorage? This cannot be undone.')) {
                localStorage.removeItem(STORAGE_KEY);
                showMessage('All data cleared');
                document.getElementById('output').textContent = 'No data in localStorage';
            }
        }
        
        // Auto-check on load
        checkCurrentData();
    </script>
</body>
</html>
